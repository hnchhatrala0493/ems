services:
  mongo:
    image: mongo:8
    volumes: [mongo-data:/data/db]
    ports: ["27017:27017"]
  api:
    build: ./backend
    environment:
      MONGODB_URI: mongodb://mongo:27017/employee_management
      JWT_ACCESS_SECRET: local-docker-access-secret-change-before-production
      JWT_REFRESH_SECRET: local-docker-refresh-secret-change-before-production
      CLIENT_URL: http://localhost:5173
    ports: ["5000:5000"]
    depends_on: [mongo]
  web:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  mongo-data:
